<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>For Shruti 🌷</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe6f2,#f0e9ff);
font-family:Poppins;
flex-direction:column;
}

h1{
margin-bottom:30px;
color:#ff4d8d;
}

.gift-box{
width:160px;
height:140px;
position:relative;
cursor:pointer;
}

.gift-body{
width:100%;
height:90px;
background:#ff6aa9;
border-radius:10px;
position:absolute;
bottom:0;
}

.gift-lid{
width:100%;
height:50px;
background:#ff4d8d;
border-radius:10px;
position:absolute;
top:0;
transition:.6s;
}

.ribbon{
position:absolute;
width:24px;
height:140px;
background:white;
left:50%;
transform:translateX(-50%);
}

.gift-open .gift-lid{
transform:translateY(-80px) rotate(-12deg);
}

.arrow{
font-size:28px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(10px)}
}

</style>

</head>

<body>

<h1>Click the gift 🎁</h1>

<div class="arrow">⬇</div>

<div class="gift-box" id="gift">

<div class="gift-lid"></div>
<div class="gift-body"></div>
<div class="ribbon"></div>

</div>

<script>

const gift=document.getElementById("gift")

gift.onclick=()=>{

gift.classList.add("gift-open")

setTimeout(()=>{

window.location.href="surprise.html"

},800)

}

</script>

</body>
</html>
